<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ PERFORMANCE: Fonts loaded here as <link> tags (faster than CSS @import) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">

    <!-- ✅ SEO -->
    <title>ConversionFoxx | Predictable Growth Systems</title>
    <meta name="description" content="ConversionFoxx engineers predictable revenue systems for high-growth businesses. Growth Audit, Lead Generation, Conversion Optimization & Revenue Operations." />
    <meta name="keywords" content="growth audit, revenue operations, conversion optimization, lead generation, digital marketing agency" />
    <meta name="author" content="ConversionFoxx" />
    <link rel="canonical" href="https://conversionfoxx.com/" />

    <!-- ✅ SOCIAL SHARING (WhatsApp, LinkedIn, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://conversionfoxx.com/" />
    <meta property="og:title" content="ConversionFoxx | Predictable Growth Systems" />
    <meta property="og:description" content="We don't just build digital products — we build revenue engines." />
    <meta property="og:image" content="https://conversionfoxx.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="ConversionFoxx" />
    <meta property="og:locale" content="en_IN" />

    <!-- ✅ TWITTER / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ConversionFoxx | Predictable Growth Systems" />
    <meta name="twitter:description" content="We build revenue engines for high-growth businesses." />
    <meta name="twitter:image" content="https://conversionfoxx.com/og-image.png" />

    <!-- ✅ FAVICON & THEME -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="theme-color" content="#F26E22" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
